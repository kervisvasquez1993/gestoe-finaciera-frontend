server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Routing de SPA: cualquier ruta cae a index.html
    # (evita 404 al recargar en rutas de React Router como /dashboard/transactions)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache largo para assets con hash (Vite genera nombres con hash)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gzip para reducir el tamaño de transferencia
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}